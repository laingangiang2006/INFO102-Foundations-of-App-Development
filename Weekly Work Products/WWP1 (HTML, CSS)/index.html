<!DOCTYPE html>
<html>
<head>
<title>HTML WWP</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>
<body>
<h2>HTML WWP</h2>
<h3>Contact Us</h3>
<div>
  <!-- BUG 1 FIX: Changed "href" to "action" — <form> uses the "action" attribute
       to define where the form data is sent, not "href" (that belongs to <a> tags). -->
  <form action="submitted.html">

    <!-- BUG 2 FIX: Changed for="firstName" to for="name" — the <label> "for"
         attribute must exactly match the linked input's "id". "firstName" didn't
         match "name", so clicking the label wouldn't focus the correct field. -->
    <label for="name">Name:</label>
    <input type="text" id="name"><br>

    <label for="email">Email:</label>
    <input type="email" id="email"><br>

    <label for="number">Number:</label>
    <input type="text" id="number"><br>

    <label for="issue">Issue:</label>

    <!-- BUG 3 FIX: Changed <text> to <textarea> — there is no <text> HTML element.
         The correct tag for a multi-line text input is <textarea>. -->
    <!-- BUG 8 FIX: Added closing </textarea> tag — the original had no closing tag,
         which causes all subsequent content to be swallowed inside the field. -->
    <textarea name="issue" id="issue" rows="5" cols="20"></textarea>
    <br><br>

    <!-- BUG 4 FIX: Changed class="submit" to id="submit" — the CSS targets this
         button with the ID selector "#submit". Using class= instead of id= meant
         the yellow/blue submit styles were never applied. -->
    <input type="submit" id="submit" value="Submit">
    <input type="reset" id="reset" value="Reset">

  </form>
</div>
</body>
</html>
